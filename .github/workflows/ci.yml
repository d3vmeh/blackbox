name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, "p1/*", "p2/*", "p3/*", "p4/*"]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check .

  agents-deterministic:
    name: Deterministic agent tests (no API key)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - name: AP pipeline
        run: python -m agent.run_ap
      - name: Code pipeline
        run: python -m agent.run_code

  attribution:
    name: Attribution regression suite
    runs-on: ubuntu-latest
    if: ${{ vars.RUN_ATTRIBUTION == 'true' || github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - name: Run regression suite
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python -c "
          from dotenv import load_dotenv; load_dotenv()
          from attribution.regression import run_regression_suite
          from attribution.cache import cache_stats
          r = run_regression_suite()
          stats = cache_stats()
          print(f'{r[\"passed\"]}/{r[\"total\"]} correct ({r[\"accuracy\"]*100:.1f}%)')
          print(f'Cache: {stats[\"hits\"]} hits, {stats[\"misses\"]} misses')
          for d in r['details']:
              mark = 'PASS' if d['correct'] else 'FAIL'
              print(f'  {mark}  {d[\"id\"]:<22} expected={d[\"expected\"]}  predicted={d[\"predicted\"]}')
          assert r['accuracy'] == 1.0, f'Regression failed: {r[\"accuracy\"]*100:.1f}%'
          "
